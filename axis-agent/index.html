<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C77D36" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Axis — Your Idea, Your ETF</title>
    <meta name="description" content="Build and launch your own token ETF on Solana. Discover, create, and manage automated crypto strategies." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://axs.pizza" />
    <meta property="og:title" content="Axis — Your Idea, Your ETF" />
    <meta property="og:description" content="Build and launch your own token ETF on Solana. Discover, create, and manage automated crypto strategies." />
    <meta property="og:image" content="https://axs.pizza/AxisOGP.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://axs.pizza" />
    <meta name="twitter:title" content="Axis — Your Idea, Your ETF" />
    <meta name="twitter:description" content="Build and launch your own token ETF on Solana. Discover, create, and manage automated crypto strategies." />
    <meta name="twitter:image" content="https://axs.pizza/AxisOGP.jpg" />

    <!-- Microsoft Clarity — only loads when VITE_CLARITY_PROJECT_ID is set at build time -->
    <script type="text/javascript">
      (function () {
        var id = "%VITE_CLARITY_PROJECT_ID%";
        if (!id || id.charAt(0) === "%") return;
        (function (c, l, a, r, i, t, y) {
          c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments); };
          t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
          y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", id);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
